version: 0.2

phases:
  build:
    commands:
      - set -eu
      - cd "$CODEBUILD_SRC_DIR/$TF_DIR"

      - terraform init -lock=false -input=false -reconfigure -backend-config="${BACKEND_FILE}"

      - PLAN_FILE="tfplan_${ACCOUNT_ID}_${AWS_REGION}"
      - PLAN_HASH_FILE="${PLAN_FILE}.sha256"
      - PLAN_COMMIT_FILE="plan_commit_${ACCOUNT_ID}_${AWS_REGION}.txt"
      - PLAN_ACCOUNT_FILE="plan_account_id_${ACCOUNT_ID}_${AWS_REGION}.txt"
      - PLAN_REGION_FILE="plan_region_${ACCOUNT_ID}_${AWS_REGION}.txt"
      - PLAN_BUILD_FILE="plan_build_id_${ACCOUNT_ID}_${AWS_REGION}.txt"
      - PLAN_CREATED_FILE="plan_created_at_${ACCOUNT_ID}_${AWS_REGION}.txt"
      - PLAN_CREATED_EPOCH_FILE="plan_created_epoch_${ACCOUNT_ID}_${AWS_REGION}.txt"

      - terraform plan -no-color -input=false -var-file="${TFVARS_FILE}" -var-file="${SHARED_VARS}" -out="$PLAN_FILE"
      - sha256sum "$PLAN_FILE" > "$PLAN_HASH_FILE"

      - printf '%s' "$CODEBUILD_RESOLVED_SOURCE_VERSION" > "$PLAN_COMMIT_FILE"
      - printf '%s' "$ACCOUNT_ID" > "$PLAN_ACCOUNT_FILE"
      - printf '%s' "$AWS_REGION" > "$PLAN_REGION_FILE"
      - printf '%s' "$CODEBUILD_BUILD_ID" > "$PLAN_BUILD_FILE"
      - date -u +"%Y-%m-%dT%H:%M:%SZ" > "$PLAN_CREATED_FILE"
      - date -u +%s > "$PLAN_CREATED_EPOCH_FILE"

artifacts:
  base-directory: "$CODEBUILD_SRC_DIR/$TF_DIR"
  files:
    - tfplan_*
    - "*.sha256"
    - plan_commit_*.txt
    - plan_account_id_*.txt
    - plan_region_*.txt
    - plan_build_id_*.txt
    - plan_created_at_*.txt
    - plan_created_epoch_*.txt
  discard-paths: yes